<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Přihlášení – Akulab Protokoly</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6fb; }
    .login-card { max-width: 380px; margin: 10vh auto; }
    .login-header { background: #1F4E79; color: #fff; border-radius: .5rem .5rem 0 0; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="card shadow">
    <div class="login-header p-4 text-center">
      <i class="bi bi-file-earmark-music fs-2 d-block mb-1"></i>
      <h5 class="mb-0 fw-bold">Akulab – Protokoly hluku</h5>
    </div>
    <div class="card-body p-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Heslo</label>
          <input type="password" name="password" class="form-control" autofocus required>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>Vstoupit
        </button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
