<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Protokoly – Akulab{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <style>
    body { background: #f4f6fb; }
    .navbar { background: #1F4E79 !important; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .badge-set { font-size: .8rem; }
    #protokoly-table thead th { background: #1F4E79; color: #fff; white-space: nowrap; }
    #protokoly-table tbody tr:hover { background: #e8f0fb; }
    .dataTables_wrapper .dataTables_filter { display: none; }
    .card-upload { border: 2px dashed #90afd4; background: #f0f5fb; }
    .stat-card { border-left: 4px solid #1F4E79; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark navbar-expand-lg mb-4 shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="/">
      <i class="bi bi-file-earmark-music me-2"></i>Akulab – Protokoly hluku
    </a>
    <a href="/logout" class="btn btn-outline-light btn-sm ms-auto">
      <i class="bi bi-box-arrow-right me-1"></i>Odhlásit
    </a>
  </div>
</nav>

<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
